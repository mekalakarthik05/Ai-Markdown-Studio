<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Markdown to HTML Converter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">📝 MD → HTML</div>
    <div class="nav-links">
        <span>Fast</span>
        <span>Secure</span>
        <span>Free</span>
    </div>
</nav>

<section class="hero">
    <div class="glass-card">

        <h1>Markdown to HTML</h1>
        <p class="subtitle">
            Convert your Markdown files into clean, beautiful HTML instantly.
        </p>

        <div class="steps">
            <span>1️⃣ Upload</span>
            <span>→</span>
            <span>2️⃣ Convert</span>
            <span>→</span>
            <span>3️⃣ Download</span>
        </div>

        <form method="POST" enctype="multipart/form-data" id="upload-form">

            <div id="drop-zone">
                <div class="icon">📄</div>
                <p><strong>Drag & drop</strong> your Markdown file</p>
                <span>or click to browse</span>

                <input
                    type="file"
                    name="mdfile"
                    id="file-input"
                    accept=".md"
                >
            </div>

            <p id="file-name"></p>
            <p id="error-msg"></p>

            <button type="submit" class="primary-btn">
                ⚡ Convert to HTML
            </button>
        </form>

    </div>
</section>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p>Converting your Markdown file…</p>
</div>

<script src="/static/script.js"></script>
</body>
</html>
